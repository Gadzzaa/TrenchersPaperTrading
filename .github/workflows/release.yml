
name: Release Extension
on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      # --- GET RELEASE INFO BEFORE SEMANTIC RELEASE ---
      - name: Get Current Latest Release
        id: pre_release
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          CURRENT_TAG=$(gh release view --json tagName -q '.tagName' 2>/dev/null || echo "none")
          echo "current_tag=$CURRENT_TAG" >> $GITHUB_OUTPUT
          echo "Current latest tag: $CURRENT_TAG"

      # --- SEMANTIC RELEASE ---
      - name: Run Semantic Release
        id: semantic
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: npx semantic-release

      # --- GET LATEST RELEASE INFO ---
      - name: Get Latest Release After Semantic Release
        id: latest_release
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          TAG_NAME=$(gh release view --json tagName -q '.tagName' 2>/dev/null || echo "none")
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "Latest tag after semantic-release: $TAG_NAME"
          
          # Check if a new release was created
          if [ "$TAG_NAME" = "none" ] || [ "$TAG_NAME" = "${{ steps.pre_release.outputs.current_tag }}" ]; then
            echo "No new release created, skipping Chrome Web Store upload"
            echo "skip_upload=true" >> $GITHUB_OUTPUT
          else
            echo "New release created: $TAG_NAME"
            echo "skip_upload=false" >> $GITHUB_OUTPUT
          fi

      # --- CHECK CHROME WEB STORE VERSION ---
      - name: Check Chrome Web Store Version
        id: check_webstore_version
        if: steps.latest_release.outputs.skip_upload != 'true'
        continue-on-error: true
        run: |
          TAG_NAME="${{ steps.latest_release.outputs.tag_name }}"
          VERSION="${TAG_NAME#v}"
          
          node Scripts/check-webstore-version.cjs \
            "${{ secrets.CHROME_EXTENSION_ID }}" \
            "$VERSION" \
            "${{ secrets.CHROME_CLIENT_ID }}" \
            "${{ secrets.CHROME_CLIENT_SECRET }}" \
            "${{ secrets.CHROME_REFRESH_TOKEN }}"
          EXIT_CODE=$?
          
          if [ $EXIT_CODE -eq 0 ]; then
            echo "Version check passed, proceeding with upload"
            echo "should_upload=true" >> $GITHUB_OUTPUT
          elif [ $EXIT_CODE -eq 2 ]; then
            echo "Version is the same, skipping upload"
            echo "should_upload=false" >> $GITHUB_OUTPUT
          elif [ $EXIT_CODE -eq 3 ]; then
            echo "Version is older, skipping upload"
            echo "should_upload=false" >> $GITHUB_OUTPUT
          else
            echo "Version check inconclusive, proceeding with upload"
            echo "should_upload=true" >> $GITHUB_OUTPUT
          fi

      # --- DOWNLOAD EXTENSION ZIP ---
      - name: Download Extension ZIP from Release
        if: steps.latest_release.outputs.skip_upload != 'true' && steps.check_webstore_version.outputs.should_upload != 'false'
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          TAG_NAME="${{ steps.latest_release.outputs.tag_name }}"
          ZIP_NAME="extension-${TAG_NAME}.zip"
          gh release download "$TAG_NAME" -p "$ZIP_NAME"
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV

      # --- UPLOAD TO CHROME WEB STORE ---
      - name: Upload and Publish to Chrome Web Store
        if: steps.latest_release.outputs.skip_upload != 'true' && steps.check_webstore_version.outputs.should_upload != 'false'
        uses: mnao305/chrome-extension-upload@v5.0.0
        with:
          file-path: ${{ env.ZIP_NAME }}
          extension-id: ${{ secrets.CHROME_EXTENSION_ID }}
          client-id: ${{ secrets.CHROME_CLIENT_ID }}
          client-secret: ${{ secrets.CHROME_CLIENT_SECRET }}
          refresh-token: ${{ secrets.CHROME_REFRESH_TOKEN }}
