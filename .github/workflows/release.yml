
name: Release Extension
on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      # --- SEMANTIC RELEASE ---
      - name: Run Semantic Release
        id: semantic
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: npx semantic-release

      # --- GET LATEST RELEASE INFO ---
      - name: Get Latest Release
        id: latest_release
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          RELEASE_DATA=$(gh release view --json tagName,assets)
          TAG_NAME=$(echo "$RELEASE_DATA" | jq -r '.tagName')
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
          
          # Check if a release was actually created
          if [ -z "$TAG_NAME" ] || [ "$TAG_NAME" = "null" ]; then
            echo "No release found, skipping Chrome Web Store upload"
            echo "skip_upload=true" >> $GITHUB_OUTPUT
          else
            echo "Found release: $TAG_NAME"
            echo "skip_upload=false" >> $GITHUB_OUTPUT
          fi

      # --- DOWNLOAD EXTENSION ZIP ---
      - name: Download Extension ZIP from Release
        if: steps.latest_release.outputs.skip_upload != 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          TAG_NAME="${{ steps.latest_release.outputs.tag_name }}"
          ZIP_NAME="extension-${TAG_NAME}.zip"
          gh release download "$TAG_NAME" -p "$ZIP_NAME"
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV

      # --- UPLOAD TO CHROME WEB STORE ---
      - name: Upload and Publish to Chrome Web Store
        if: steps.latest_release.outputs.skip_upload != 'true'
        uses: mnao305/chrome-extension-upload@v5.0.0
        with:
          file-path: ${{ env.ZIP_NAME }}
          extension-id: ${{ secrets.CHROME_EXTENSION_ID }}
          client-id: ${{ secrets.CHROME_CLIENT_ID }}
          client-secret: ${{ secrets.CHROME_CLIENT_SECRET }}
          refresh-token: ${{ secrets.CHROME_REFRESH_TOKEN }}
