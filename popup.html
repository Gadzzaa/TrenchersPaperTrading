<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link rel="stylesheet" href="Styles/popup.css" />
  </head>
  <body>
    <div class="pageCarousel">
      <div id="Home" class="menuItem">
        <div class="header">@username</div>

        <div id="balance">
          <strong id="solBalance">100.00 SOL</strong>
          <small id="pnlData">+0.00 SOL (0.00%)</small>
        </div>
        <div id="tokensData">
          <p1 id="tokensText">Tokens</p1>
          <div id="tokenList"></div>
        </div>
      </div>

      <div id="History" class="menuItem" style="display: none">
        <!-- TODO later -->
      </div>

      <div id="Settings" class="menuItem">
        <div class="header">Settings</div>
        <div id="Preferences">
          <p id="preferencesText">Preferences</p>
          <div id="themes">
            <p class="preferencesSubText">Theme:</p>
            <button id="themeDark" class="theme">Dark</button>
            <button id="themeWhite" class="theme">White</button>
          </div>
          <div id="volume" class="preferencesSubText">
            <label id="volumeText" for="volumeSlider">Volume:</label>
            <div class="slider-container">
              <input type="range" min="0" max="100" value="0" class="slider" />
              <div id="tickDiv">
                <div></div>
                <div></div>
                <div></div>
                <div></div>
                <div></div>
              </div>
              <div id="track"></div>
            </div>
          </div>
          <div id="animation" class="preferencesSubText">
            <label id="animationText" for="animationSlider"
              >Animation Quality:</label
            >
            <div class="slider-container">
              <input type="range" min="0" max="4" value="0" class="slider" />
              <div id="tickDiv">
                <div></div>
                <div></div>
                <div></div>
                <div></div>
                <div></div>
              </div>
              <div id="track"></div>
            </div>
          </div>
        </div>
        <div id="Premium">
          <p id="premiumText">Premium Features</p>
          <div id="pnlRefresh">
            <label id="pnlRefreshText" for="pnlSlider"
              >PNL Refresh Interval:</label
            >
            <input type="range" min="0" max="100" value="0" id="pnlSlider" />
          </div>
          <div id="saveWindow">
            <label id="saveWindowText" for="saveWindowBox"
              >Save Window Position:</label
            >
            <input type="checkbox" id="saveWindowBox" />
          </div>
          <div id="connectMobileApp">
            <p id="mobileText">Connect Mobile App (soon)</p>
          </div>
        </div>
        <div id="Advanced">
          <button id="debugButton">Debug Mode</button>
          <button id="updateHistoryButton">Update History</button>
        </div>
      </div>

      <div id="Account" class="menuItem">
        <p1 id="accountText">Account</p1>
        <div id="accountDetails">
          <p id="accountDetailsText">Account Details</p>
        </div>
        <div id="logoutButtonContainer">
          <button id="logoutButton">Logout</button>
        </div>
      </div>
    </div>

    <div id="footerBar">
      <div class="indicator"></div>
      <div id="footerButtons">
        <button class="footerButton active" data-menu="Home" data-index="0">
          <i id="homeIcon" class="fa-solid fa-house fa-2x"></i>
        </button>
        <button
          id="historyButton"
          class="hiddenButton footerButton"
          data-menu="History"
          data-index="1"
        >
          <i id="historyIcon" class="fa-solid fa-clock-rotate-left fa-2x"></i>
        </button>
        <button
          id="settingsButton"
          class="footerButton"
          data-menu="Settings"
          data-index="1"
        >
          <i id="settingsIcon" class="fa-solid fa-gear fa-2x"></i>
        </button>
        <button
          id="accountButton"
          class="footerButton"
          data-menu="Account"
          data-index="2"
        >
          <i id="accountIcon" class="fa-solid fa-user fa-2x"></i>
        </button>
      </div>
    </div>

    <div id="background"></div>
  </body>
  <script type="module" src="Scripts/popup.js"></script>
</html>
