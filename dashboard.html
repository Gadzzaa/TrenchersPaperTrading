<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Trenchers Paper Trading</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link rel="stylesheet" href="Styles/dashboard.css" />
  </head>

  <body>
    <div id="Container">
      <div id="Header">
        <div id="Presets">
          <button id="editPresets" class="preset">
            <i id="editIcon" class="fa-regular fa-pen-to-square"></i>
          </button>
          <button class="preset activePreset" id="preset1">P1</button>
          <button class="preset" id="preset2">P2</button>
          <button class="preset" id="preset3">P3</button>
        </div>
        <i id="Move" class="fa-solid fa-grip"></i>
        <div id="RightHeader">
          <div id="Balance">
            <img src="Images/solana-sol-logo.webp" id="solanaLogo" />
            <p id="balanceValue">99.56</p>
          </div>
          <button id="Close"></button>
        </div>
      </div>
      <div id="separatorDiv">
        <hr id="presetsSeparator" class="separator" />
        <hr id="balanceSeparator" class="separator" />
      </div>

      <div id="Content">
        <div id="Buys">
          <p id="buyText">Buy</p>
          <div id="buyButtons" class="button-row">
            <button class="buyButton" id="buy1">0.1</button>
            <button class="buyButton" id="buy2">0.25</button>
            <button class="buyButton" id="buy3">5.10</button>
            <button class="buyButton" id="buy4">2</button>
          </div>
        </div>
        <div id="Sells" class="hidden">
          <p id="sellText">Sell (%)</p>
          <div id="sellButtons" class="button-row">
            <button class="sellButton" id="sell1">10%</button>
            <button class="sellButton" id="sell2">25%</button>
            <button class="sellButton" id="sell3">30%</button>
            <button class="sellButton" id="sell4">100%</button>
          </div>
        </div>
      </div>
      <hr id="footerSeparator" />
      <div id="Footer">
        <div class="footerInfo" id="boughtInfo">
          <img src="Images/solana-sol-logo.webp" id="solanaLogo" />
          <p class="footerText" id="boughtText">0.0</p>
        </div>
        <hr id="footerInfoSep" />
        <div class="footerInfo" id="soldInfo">
          <img src="Images/solana-sol-logo.webp" id="solanaLogo" />
          <p class="footerText" id="soldText">0.0</p>
        </div>
        <hr id="footerInfoSep" />
        <div class="footerInfo" id="holdInfo">
          <img src="Images/solana-sol-logo.webp" id="solanaLogo" />
          <p class="footerText" id="holdText">0.0</p>
        </div>
        <hr id="footerInfoSep" />
        <div class="footerInfo" id="pnlInfo">
          <img src="Images/solana-sol-logo.webp" id="solanaLogo" />
          <p class="footerText" id="pnlText">+0.0</p>
        </div>
      </div>
    </div>
  </body>

  <script type="module" src="Scripts/dropdownManager.js" defer></script>
  <script type="module" src="Scripts/editManager.js" defer></script>
  <script type="module" src="Scripts/notificationSystem.js" defer></script>
  <script type="module" src="Scripts/presetManager.js" defer></script>
  <script type="module" src="Scripts/spinner.js" defer></script>
  <script type="module" src="Scripts/portofolioHandler.js" defer></script>
  <script type="module" src="Scripts/buyHandler.js" defer></script>
  <script type="module" src="Scripts/sellHandler.js" defer></script>
  <script type="module" src="Scripts/sessionChecker.js" defer></script>
  <script type="module" src="Scripts/pnlHandler.js" defer></script>
  <script type="module" src="Scripts/dashboard.js" defer></script>
</html>
