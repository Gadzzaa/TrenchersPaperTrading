<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Trenchers Paper Trading</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link rel="stylesheet" href="Styles/dashboard.css" />
  </head>

  <body>
    <div id="Container">
      <div id="Header">
        <div id="Presets">
          <button data-tooltip="Enter edit mode" id="editPresets">
            <i id="editIcon" class="fa-regular fa-pen-to-square"></i>
          </button>
          <button data-tooltip="Select preset 1" class="preset" id="preset1">
            P1
          </button>
          <button data-tooltip="Select preset 2" class="preset" id="preset2">
            P2
          </button>
          <button data-tooltip="Select preset 3" class="preset" id="preset3">
            P3
          </button>
        </div>
        <i data-tooltip="Drag to move" id="Move" class="fa-solid fa-grip"></i>
        <div id="RightHeader">
          <div data-tooltip="Current balance" id="Balance">
            <img src="Images/solana-sol-logo.png" id="solanaLogo" />
            <p id="balanceValue">100.00</p>
          </div>
          <button data-tooltip="Close app" id="Close">
            <i id="closeMark" class="fa-solid fa-xmark"></i>
          </button>
        </div>
      </div>
      <div id="separatorDiv">
        <hr id="presetsSeparator" class="separator" />
        <hr id="balanceSeparator" class="separator" />
      </div>

      <div id="Content">
        <div id="Buys" class="movableObjects">
          <p id="buyText">Buy</p>
          <div id="buyButtons" class="button-row">
            <button
              class="buyButton"
              id="buy1"
              data-action="buy"
              data-amount="0.1"
              data-tooltip=""
            ></button>
            <button
              class="buyButton"
              id="buy2"
              data-action="buy"
              data-amount="0.25"
              data-tooltip=""
            ></button>
            <button
              class="buyButton"
              id="buy3"
              data-action="buy"
              data-amount="0.75"
              data-tooltip=""
            ></button>
            <button
              class="buyButton"
              id="buy4"
              data-action="buy"
              data-amount="1"
              data-tooltip=""
            ></button>
          </div>
        </div>
        <div id="Sells" class="hidden movableObjects">
          <p id="sellText">Sell (%)</p>
          <div id="sellButtons" class="button-row">
            <button
              class="sellButton"
              id="sell1"
              data-action="sell"
              data-amount="10"
              data-tooltip=""
            ></button>
            <button
              class="sellButton"
              id="sell2"
              data-action="sell"
              data-amount="25"
              data-tooltip=""
            ></button>
            <button
              class="sellButton"
              id="sell3"
              data-action="sell"
              data-amount="30"
              data-tooltip=""
            ></button>
            <button
              class="sellButton"
              id="sell4"
              data-action="sell"
              data-amount="100"
              data-tooltip=""
            ></button>
          </div>
        </div>
      </div>
      <div id="Footer">
        <hr id="footerSeparator" />
        <div id="footerData" class="movableObjects">
          <div
            data-tooltip="Total bought this session"
            class="footerInfo"
            id="boughtInfo"
          >
            <img src="Images/solana-sol-logo.png" id="solanaLogo" />
            <p class="footerText" id="boughtText">0.0</p>
          </div>
          <hr id="footerInfoSep" />
          <div
            data-tooltip="Total sold this session"
            class="footerInfo"
            id="soldInfo"
          >
            <img src="Images/solana-sol-logo.png" id="solanaLogo" />
            <p class="footerText" id="soldText">0.0</p>
          </div>
          <hr id="footerInfoSep" />
          <div
            data-tooltip="Currently holding"
            class="footerInfo"
            id="holdInfo"
          >
            <img src="Images/solana-sol-logo.png" id="solanaLogo" />
            <p class="footerText" id="holdText">0.0</p>
          </div>
          <hr id="footerInfoSep" />
          <div data-tooltip="Profit & Loss" class="footerInfo" id="pnlInfo">
            <img src="Images/solana-sol-logo.png" id="solanaLogo" />
            <p class="footerText" id="pnlText">+0.0 (0.00%)</p>
          </div>
        </div>
      </div>
    </div>

    <!-- Tooltip container -->
    <div id="tooltip" class="tooltip"></div>
    <div id="notification" class="notification"></div>

    <!-- Login Blocker -->
    <div id="loginBlocker">
      <div id="loginMessage">Please log in to trade</div>
    </div>
  </body>

  <script type="module" src="Scripts/tooltipManager.js" defer></script>
  <script type="module" src="Scripts/editManager.js" defer></script>
  <script type="module" src="Scripts/presetManager.js" defer></script>
  <script type="module" src="Scripts/pnlHandler.js" defer></script>
  <script type="module" src="Scripts/utils.js" defer></script>
  <script type="module" src="Scripts/API.js" defer></script>
  <script type="module" src="Scripts/dashboard.js"></script>
</html>
