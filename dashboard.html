<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>Trenchers Paper Trading</title>
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link crossorigin href="https://fonts.gstatic.com" rel="preconnect"/>
    <link href="Styles/themes.css" rel="stylesheet"/>
    <link
            href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
            rel="stylesheet"
    />
    <link
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
            rel="stylesheet"
    />
    <link href="Styles/dashboard.css" rel="stylesheet"/>
</head>

<body style="pointer-events: none">
<div id="Container">
    <div id="Header">
        <div id="Presets">
            <button data-tooltip="Enter edit mode" id="editPresets">
                <i class="fa-regular fa-pen-to-square" id="editIcon"></i>
            </button>
            <button
                    class="preset activePreset"
                    data-tooltip="Select preset 1"
                    id="preset1"
            >
                P1
            </button>
            <button class="preset" data-tooltip="Select preset 2" id="preset2">
                P2
            </button>
            <button class="preset" data-tooltip="Select preset 3" id="preset3">
                P3
            </button>
        </div>
        <i class="fa-solid fa-grip" data-tooltip="Drag to move" id="Move"></i>
        <div id="RightHeader">
            <div data-tooltip="Current balance" id="Balance">
                <img class="solanaLogo" src="Images/solana-sol-logo.png"/>
                <p id="balanceValue">100.00</p>
            </div>
            <button data-tooltip="Close app" id="Close">
                <i class="fa-solid fa-xmark" id="closeMark"></i>
            </button>
        </div>
    </div>
    <div id="separatorDiv">
        <hr class="separator" id="presetsSeparator"/>
        <hr class="separator" id="balanceSeparator"/>
    </div>

    <div id="Content">
        <div class="movableObjects" id="Buys">
            <p id="buyText">Buy</p>
            <div class="button-row" id="buyButtons">
                <button
                        class="buyButton"
                        data-action="buy"
                        data-amount="0.1"
                        data-tooltip=""
                        id="buy1"
                ></button>
                <button
                        class="buyButton"
                        data-action="buy"
                        data-amount="0.25"
                        data-tooltip=""
                        id="buy2"
                ></button>
                <button
                        class="buyButton"
                        data-action="buy"
                        data-amount="0.75"
                        data-tooltip=""
                        id="buy3"
                ></button>
                <button
                        class="buyButton"
                        data-action="buy"
                        data-amount="1"
                        data-tooltip=""
                        id="buy4"
                ></button>
            </div>
        </div>
        <div class="hidden movableObjects" id="Sells">
            <p id="sellText">Sell (%)</p>
            <div class="button-row" id="sellButtons">
                <button
                        class="sellButton"
                        data-action="sell"
                        data-amount="10"
                        data-tooltip=""
                        id="sell1"
                ></button>
                <button
                        class="sellButton"
                        data-action="sell"
                        data-amount="25"
                        data-tooltip=""
                        id="sell2"
                ></button>
                <button
                        class="sellButton"
                        data-action="sell"
                        data-amount="30"
                        data-tooltip=""
                        id="sell3"
                ></button>
                <button
                        class="sellButton"
                        data-action="sell"
                        data-amount="100"
                        data-tooltip=""
                        id="sell4"
                ></button>
            </div>
        </div>
    </div>
    <div id="Footer">
        <hr id="footerSeparator"/>
        <div class="movableObjects" id="footerData">
            <div
                    class="footerInfo"
                    data-tooltip="Total bought this session"
                    id="boughtInfo"
            >
                <img class="solanaLogo" src="Images/solana-sol-logo.png"/>
                <p class="footerText" id="boughtText">0.0</p>
            </div>
            <hr class="footerInfoSep"/>
            <div
                    class="footerInfo"
                    data-tooltip="Total sold this session"
                    id="soldInfo"
            >
                <img class="solanaLogo" src="Images/solana-sol-logo.png"/>
                <p class="footerText" id="soldText">0.0</p>
            </div>
            <hr class="footerInfoSep"/>
            <div
                    class="footerInfo"
                    data-tooltip="Currently holding"
                    id="holdInfo"
            >
                <img class="solanaLogo" src="Images/solana-sol-logo.png"/>
                <p class="footerText" id="holdText">0.0</p>
            </div>
            <hr class="footerInfoSep"/>
            <div class="footerInfo" data-tooltip="Profit & Loss" id="pnlInfo">
                <img class="solanaLogo" src="Images/solana-sol-logo.png"/>
                <p class="footerText" id="pnlText">+0.0 (0.00%)</p>
            </div>
        </div>
    </div>
</div>

<!-- Tooltip container -->
<div class="tooltip" id="tooltip"></div>

<!-- Login Blocker -->
<div id="Blocker">
    <div id="noSessionMessage">Please log in to trade</div>
    <div id="noInternetMessage">Server unavailable. Reconnecting...</div>
    <div id="updateReqMessage">Update required!</div>
</div>
</body>

<script defer src="Scripts/tooltipManager.js" type="module"></script>
<script
        src="Scripts/Dashboard/Services/dashboardService.js"
        type="module"
></script>
</html>
